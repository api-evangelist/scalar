aid: scalar
url: >-
  https://raw.githubusercontent.com/api-evangelist/scalar/refs/heads/main/apis.yml
apis:
  - aid: undefined:scalar
    name: Scalar
    tags:
      - Documentation
      - Clients
      - SDKs
      - Registries
    humanURL: https://scalar.com/
    properties:
      - url: https://scalar.com/
        type: Documentation
    description: >-
      Scalar is an open-source API platform that provides tools for creating
      interactive API documentation, an embedded API client, and managing the
      API lifecycle. It offers a modern, customizable alternative to traditional
      tools like Swagger UI.
  - aid: scalar:scalar-api-references
    name: Scalar API References
    tags:
      - Documentation
      - OpenAPI
      - Swagger
      - References
    humanURL: https://scalar.com/products/api-references/getting-started
    properties:
      - url: https://scalar.com/products/api-references/getting-started
        type: GettingStarted
      - url: https://guides.scalar.com/scalar/scalar-api-references/getting-started
        type: Documentation
      - url: https://guides.scalar.com/scalar/scalar-api-references/themes
        type: Documentation
    description: >-
      Scalar API References renders modern, interactive API documentation from
      OpenAPI and Swagger specifications. It supports multiple themes, custom
      styling, and framework-specific integrations for React, FastAPI, ASP.NET
      Core, Spring Boot, and more.
  - aid: scalar:scalar-api-client
    name: Scalar API Client
    tags:
      - Client
      - Testing
      - OpenAPI
      - REST
    humanURL: https://scalar.com/products/api-client/getting-started
    properties:
      - url: https://scalar.com/products/api-client/getting-started
        type: GettingStarted
      - url: https://client.scalar.com/
        type: Application
    description: >-
      Scalar API Client is a fully open-source, offline-first REST API client
      built on the OpenAPI standard. It supports collections,
      pre/after-response scripting, environments, test results, and collection
      runners. Available for Windows, macOS, and Linux, as well as a
      browser-based version.
  - aid: scalar:scalar-docs
    name: Scalar Docs
    tags:
      - Documentation
      - Markdown
      - MDX
      - Developer Portal
    humanURL: https://scalar.com/products/docs/getting-started
    properties:
      - url: https://scalar.com/products/docs/getting-started
        type: GettingStarted
      - url: https://docs.scalar.com/
        type: Portal
      - url: https://guides.scalar.com/scalar/scalar-docs/getting-started
        type: Documentation
    description: >-
      Scalar Docs enables teams to create and publish developer documentation
      that stays in sync with their API and code. It supports writing with a
      WYSIWYG editor, pulling Markdown and MDX files from repositories, and
      generating API references from OpenAPI documents with Git Sync and CI/CD
      integration.
  - aid: scalar:scalar-registry
    name: Scalar Registry
    tags:
      - Registry
      - OpenAPI
      - Versioning
      - Governance
    humanURL: https://scalar.com/products/registry/getting-started
    properties:
      - url: https://scalar.com/products/registry/getting-started
        type: GettingStarted
      - url: https://guides.scalar.com/scalar/scalar-registry/getting-started
        type: Documentation
    description: >-
      Scalar Registry provides centralized management and versioning of OpenAPI
      Documents, JSON Schemas, and Spectral Rules with deep Git integration. It
      serves as the single source of truth for API definitions and supports
      both private and public registries with CI/CD workflows.
  - aid: scalar:scalar-sdks
    name: Scalar SDKs
    tags:
      - SDKs
      - Code Generation
      - TypeScript
      - Python
    humanURL: https://scalar.com/products/sdks/getting-started
    properties:
      - url: https://scalar.com/products/sdks/getting-started
        type: GettingStarted
      - url: https://guides.scalar.com/scalar/scalar-sdks/getting-started
        type: Documentation
    description: >-
      Scalar SDKs generates type-safe client libraries from OpenAPI
      specifications for TypeScript, Python, Golang, PHP, Java, and Ruby.
      Features include automated GitHub workflows, code samples, full OpenAPI
      auth support, file streaming, and webhooks support.
