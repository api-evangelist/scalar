naftiko: 1.0.0-alpha2
info:
  label: Announce Scalar docs publishes into Slack channels
  description: When a Scalar docs project is published, redeployed, or unpublished, post a structured Slack message into the API platform channel with the spec name, version, and link to the rendered reference.
  tags:
  - Scalar
  - Integration
  - Chat
  - slack
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    SCALAR_API_KEY: SCALAR_API_KEY
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: scalar
    baseUri: https://api.scalar.com
    description: Scalar API operations consumed by this integration.
    resources:
    - name: publish-redeploy
      path: /publish/redeploy
      operations:
      - name: redeploydocs
        method: POST
        description: The Scalar event that triggers the Slack announcement.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: managed-doc-namespace
      path: /managed-doc/{namespace}
      operations:
      - name: getmanageddoc
        method: GET
        description: Look up display metadata for the announced doc.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespace
          in: path
          type: string
          description: Path parameter namespace.
          required: true
  - type: http
    namespace: slack
    baseUri: https://slack.com/api
    description: Slack Web API operations consumed by this integration.
    resources:
    - name: chat-postmessage
      path: /chat.postMessage
      operations:
      - name: postmessage
        method: POST
        description: 'Slack Web API: postMessage'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: chat-update
      path: /chat.update
      operations:
      - name: updatemessage
        method: POST
        description: 'Slack Web API: updateMessage'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: scalar-slack-mcp
    description: MCP adapter for the scalar-slack integration.
    tools:
    - name: scalar_slack
      description: Execute the scalar slack integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: scalar-slack-rest
    port: 8080
    description: REST adapter for the scalar-slack integration.
    resources:
    - path: /scalar-slack
      name: scalar-slack
      description: REST surface for the scalar-slack integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the scalar-slack integration.
        call: scalar_slack
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
