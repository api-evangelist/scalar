      - name: postpublishcancel
        method: POST
        description: Cancel an in-flight publish before it goes live
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
