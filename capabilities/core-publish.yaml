    baseUri: https://example.com
    description: Core — publish business capability. Self-contained, no shared references.
    resources:
    - name: publish-dns-check
      path: /publish/dns-check
      operations:
      - name: postpublishdnscheck
        method: POST
        description: Validates the DNS records for a specified subdomain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: unpublish
      path: /unpublish
      operations:
      - name: deleteunpublish
        method: DELETE
        description: Removes the active deploy from a project, without deleting cached assets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: publish
      path: /publish
      operations:
      - name: deletepublish
        method: DELETE
        description: Delete a publish record and its cached assets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: pubsub-publish-deleted
      path: /pubsub/publish-deleted
      operations:
      - name: postpubsubpublishdeleted
        method: POST
        description: Deletes a cached build from the GCP bucket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: publish-redeploy
      path: /publish/redeploy
      operations:
      - name: postpublishredeploy
        method: POST
        description: Redeploy a previous publish
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: publish-bulk
      path: /publish/bulk
      operations:
      - name: deletepublishbulk
        method: DELETE
        description: Bulk delete all non-deployed publish records
        outputRawFormat: json
        outputParameters:
        - name: result
