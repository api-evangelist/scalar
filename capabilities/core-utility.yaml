naftiko: 1.0.0-alpha2
info:
  label: Core — utility
  description: 'Core — utility. 3 operations. Lead operation: Submit app feedback. Self-contained Naftiko capability covering one business surface.'
  tags:
  - Scalar
  - utility
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    SCALAR_API_KEY: SCALAR_API_KEY
capability:
  consumes:
  - type: http
    namespace: core-utility
    baseUri: https://example.com
    description: Core — utility business capability. Self-contained, no shared references.
    resources:
    - name: feedback
      path: /feedback
      operations:
      - name: postfeedback
        method: POST
        description: Submit app feedback
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: signup-data
      path: /signup-data
      operations:
      - name: postsignupdata
        method: POST
        description: Save docs data on signup
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: waitlist
      path: /waitlist
      operations:
      - name: postwaitlist
        method: POST
        description: Submit app feedback
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: core-utility-rest
    port: 8080
    description: REST adapter for Core — utility. One resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/feedback
      name: feedback
      description: REST surface for feedback.
      operations:
      - method: POST
        name: postfeedback
        description: Submit app feedback
        call: core-utility.postfeedback
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/signup-data
      name: signup-data
      description: REST surface for signup-data.
      operations:
      - method: POST
        name: postsignupdata
        description: Save docs data on signup
        call: core-utility.postsignupdata
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/waitlist
      name: waitlist
      description: REST surface for waitlist.
      operations:
      - method: POST
        name: postwaitlist
        description: Submit app feedback
        call: core-utility.postwaitlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: core-utility-mcp
    port: 9090
    transport: http
    description: MCP adapter for Core — utility. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: scalar-postfeedback
      description: Submit app feedback
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: core-utility.postfeedback
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: scalar-postsignupdata
      description: Save docs data on signup
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: core-utility.postsignupdata
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: scalar-postwaitlist
      description: Submit app feedback
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: core-utility.postwaitlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
