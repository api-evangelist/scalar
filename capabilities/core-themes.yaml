naftiko: 1.0.0-alpha2
info:
  label: Core — themes
  description: 'Core — themes. 8 operations. Lead operation: Get a theme document by slug. Self-contained Naftiko capability covering one business surface.'
  tags:
  - Scalar
  - themes
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
