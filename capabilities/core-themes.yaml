        name: getthemes
        description: Get a list of all themes for the team
        call: core-themes.getthemes
        with: {}
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postthemes
        description: Create a new theme for the team
        call: core-themes.postthemes
