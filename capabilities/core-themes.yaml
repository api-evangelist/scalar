    namespace: core-themes
    baseUri: https://example.com
    description: Core — themes business capability. Self-contained, no shared references.
    resources:
    - name: themes-slug
      path: /themes/{slug}
      operations:
      - name: getthemesslug
        method: GET
        description: Get a theme document by slug
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          description: path parameter slug.
          required: true
      - name: patchthemesslug
        method: PATCH
        description: Update themes metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          description: path parameter slug.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: putthemesslug
        method: PUT
        description: Update themes document
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          description: path parameter slug.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletethemesslug
        method: DELETE
        description: Delete a specific themes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          description: path parameter slug.
          required: true
    - name: themes
      path: /themes
      operations:
      - name: getthemes
        method: GET
        description: Get a list of all themes for the team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
      - name: postthemes
        method: POST
        description: Create a new theme for the team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: pubsub-theme-updated
      path: /pubsub/theme-updated
      operations:
      - name: postpubsubthemeupdated
        method: POST
        description: PubSub theme updated route
        outputRawFormat: json
        outputParameters:
        - name: result
