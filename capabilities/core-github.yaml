naftiko: 1.0.0-alpha2
info:
  label: Core — github
  description: 'Core — github. 16 operations. Lead operation: Get and save a user github token to their database object. This allows subsequent queries for github data from the users scope.. Self-contained Naftiko capability covering one business surface.'
  tags:
  - Scalar
  - github
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    SCALAR_API_KEY: SCALAR_API_KEY
capability:
  consumes:
  - type: http
    namespace: core-github
    baseUri: https://example.com
    description: Core — github business capability. Self-contained, no shared references.
    resources:
    - name: github-authorize
      path: /github/authorize
      operations:
      - name: getgithubauthorize
        method: GET
        description: Get and save a user github token to their database object. This allows subsequent queries for github data from the users scope.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: code
          in: query
          type: string
          description: query parameter code.
          required: true
        - name: state
          in: query
          type: string
          description: query parameter state.
          required: true
    - name: github-link-initiate
      path: /github/link/initiate
      operations:
      - name: getgithublinkinitiate
        method: GET
        description: Issue a signed OAuth state token for the GitHub user-authorization flow and return the GitHub authorize URL the client should redirect to. O
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: redirect
          in: query
          type: string
          description: query parameter redirect.
    - name: github-repos
      path: /github/repos
      operations:
      - name: getgithubrepos
        method: GET
        description: Get a list of repositories that can be linked to a project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: github-repos-id
      path: /github/repos/{id}
      operations:
      - name: getgithubreposid
        method: GET
        description: Get repository info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: number
          description: path parameter id.
          required: true
    - name: github-link-repo
      path: /github/link-repo
      operations:
      - name: postgithublinkrepo
        method: POST
        description: Links a github repo to a Scalar github project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
